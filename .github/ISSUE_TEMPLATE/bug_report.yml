name: Bug report
description: Report a concrete failing behavior in scripts, docs, workflows, or skill packaging.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include evidence without secrets or private data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
      placeholder: A concise description of the failure.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - skills
        - installer
        - verification script
        - GitHub Actions
        - docs
        - security tooling
        - dependency/tooling
        - other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include commands and relevant paths.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste short, redacted output only. Attach longer logs if needed.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node/npm versions, relevant tool versions.
      placeholder: |
        OS:
        Node:
        npm:
        Tool versions:
    validations:
      required: false
  - type: textarea
    id: checks
    attributes:
      label: Checks run
      placeholder: |
        npm run typecheck: PASS/FAIL
        npm run test:unit: PASS/FAIL
        npm run verify:skills: PASS/FAIL
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I did not include secrets, tokens, API keys, `.env` values, or private data.
          required: true
