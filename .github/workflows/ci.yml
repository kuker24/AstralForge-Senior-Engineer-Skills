name: CI

on: [push, pull_request]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run typecheck

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with: { config: 'p/default' }
      - name: OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with: { scan-args: '--format json --output osv-results.json .' }
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: osv-results.json
          if-no-files-found: ignore

  dead-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx knip --reporter json > knip-results.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: knip-report
          path: knip-results.json
          if-no-files-found: error

  skill-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run verify:skills
      - run: npm run audit:skills
      - name: Fail on non-PASS skill audit rows
        run: |
          python - <<'PY'
          import csv
          import sys

          failing = []
          with open('reports/skill-audit-results.csv', newline='', encoding='utf-8') as handle:
              for row in csv.DictReader(handle):
                  if row['verdict'] in {'STUB', 'BROKEN', 'NEEDS_REVIEW'}:
                      failing.append(row)

          if failing:
              for row in failing:
                  print(f"{row['skill_name']}: {row['verdict']} - {row['notes']}", file=sys.stderr)
              sys.exit(1)

          print('Substantive skill audit passed')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: skill-audit
          path: |
            reports/skill-audit-results.csv
            reports/skill-audit-summary.md
          if-no-files-found: error

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Install pre-commit and Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          python -m pip install --user pre-commit
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          GITLEAKS_ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_ARCHIVE}" -o "/tmp/${GITLEAKS_ARCHIVE}"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o /tmp/gitleaks-checksums.txt
          grep "  ${GITLEAKS_ARCHIVE}$" /tmp/gitleaks-checksums.txt | (cd /tmp && sha256sum -c -)
          tar -xzf "/tmp/${GITLEAKS_ARCHIVE}" -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          pre-commit --version
          gitleaks version
      - run: pre-commit run --all-files
