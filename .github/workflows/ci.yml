name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Coverage
        run: npm run test:coverage

      - name: Verify source skills
        run: npm run verify:skills

      - name: Substantive skill audit
        run: |
          npm run audit:skills
          python - <<'PY'
          import csv
          import sys

          failing = []
          with open('reports/skill-audit-results.csv', newline='', encoding='utf-8') as handle:
              for row in csv.DictReader(handle):
                  if row['verdict'] in {'STUB', 'BROKEN', 'NEEDS_REVIEW'}:
                      failing.append(row)

          if failing:
              for row in failing:
                  print(f"{row['skill_name']}: {row['verdict']} - {row['notes']}", file=sys.stderr)
              sys.exit(1)

          print('Substantive skill audit passed')
          PY

      - name: Upload skill audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-audit
          path: |
            reports/skill-audit-results.csv
            reports/skill-audit-summary.md
          if-no-files-found: error

      - name: Knip
        run: npx knip

      - name: Install pre-commit and Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          python -m pip install --user pre-commit
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          GITLEAKS_ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_ARCHIVE}" -o "/tmp/${GITLEAKS_ARCHIVE}"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o /tmp/gitleaks-checksums.txt
          grep "  ${GITLEAKS_ARCHIVE}$" /tmp/gitleaks-checksums.txt | (cd /tmp && sha256sum -c -)
          tar -xzf "/tmp/${GITLEAKS_ARCHIVE}" -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          pre-commit --version
          gitleaks version

      - name: Pre-commit hooks
        run: pre-commit run --all-files

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
