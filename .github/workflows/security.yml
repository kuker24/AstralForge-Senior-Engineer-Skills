name: Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Semgrep
        run: |
          python -m pip install --user semgrep==1.167.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          semgrep --version

      - name: Install OSV-Scanner
        env:
          OSV_SCANNER_VERSION: 2.4.0
        run: |
          OSV_SCANNER_BIN="osv-scanner_linux_amd64"
          curl -fsSL "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/${OSV_SCANNER_BIN}" -o "/tmp/${OSV_SCANNER_BIN}"
          curl -fsSL "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_SHA256SUMS" -o /tmp/osv-scanner_SHA256SUMS
          grep "  ${OSV_SCANNER_BIN}$" /tmp/osv-scanner_SHA256SUMS | (cd /tmp && sha256sum -c -)
          sudo install -m 0755 "/tmp/${OSV_SCANNER_BIN}" /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          GITLEAKS_ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_ARCHIVE}" -o "/tmp/${GITLEAKS_ARCHIVE}"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o /tmp/gitleaks-checksums.txt
          grep "  ${GITLEAKS_ARCHIVE}$" /tmp/gitleaks-checksums.txt | (cd /tmp && sha256sum -c -)
          tar -xzf "/tmp/${GITLEAKS_ARCHIVE}" -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Semgrep
        run: semgrep scan --config p/default --metrics=off --json --json-output=semgrep-results.json

      - name: OSV-Scanner
        run: osv-scanner scan source -r . --format json --output-file osv-results.json

      - name: Gitleaks
        run: gitleaks git --redact --report-format json --report-path gitleaks-report.json .

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            semgrep-results.json
            osv-results.json
            gitleaks-report.json
          if-no-files-found: ignore
